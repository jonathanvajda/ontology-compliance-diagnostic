<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="./images/block-logo.png">

  <title>Ontology Curation Manager</title>
    <meta name="description" content="Curation Status Manager (needs a better name) is a web application for checking an ontology against a variety of quality assurance checks (SPARQL or SHACL based, typically), generating a report for recommending a per-ontology error/warn/info list and per-element curation-status (OBO style) maturity tag. Supports exporting in CSV and YAML" />
  <meta name="author" content="Jonathan Vajda" />
  <meta name="dcterms.creator" content="Jonathan Vajda" />
  <meta name="dcterms.rightsHolder" content="Jonathan Vajda" />
  <meta name="license" content="CC BY 4.0" />
  <meta link rel="license" href="https://creativecommons.org/licenses/by/4.0/" />
  <meta name="dcterms.license" content="https://creativecommons.org/licenses/by/4.0/" />
  <meta name="version" content="0.2.0" />
  <link rel="shortcut icon" href="favicon.ico">

  <!-- Public CSS -->
  <link rel="stylesheet" href="./styles/skeleton.css" />

  <!-- App Global CSS -->
  <script>
    (function () {
      const APPBASE_CSS_SOURCES = [
        /*"./styles/app-base.css", local dev copy first */
        "https://jonathanvajda.github.io/OntoEagle/styles/app-base.css",
        "https://jonathanvajda.github.io/table-nova/styles/app-base.css",
      ];

      function loadCss(href) {
        return new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;

          link.onload = () => resolve(href);
          link.onerror = () => reject(new Error("CSS failed: " + href));

          document.head.appendChild(link);
        });
      }

      function showFailure(msg) {
        console.error(msg);
        // Optional user-visible banner
        const style = document.createElement("style");
        style.textContent =
          ".asset-fail-banner{position:fixed;left:0;right:0;top:0;z-index:9999;" +
          "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
          "border-bottom:1px solid rgba(0,0,0,.2)}";
        document.head.appendChild(style);

        const div = document.createElement("div");
        div.className = "asset-fail-banner";
        div.textContent = msg;
        document.body ? document.body.prepend(div) : document.addEventListener("DOMContentLoaded", () => document.body.prepend(div));
      }

      (async () => {
        for (const href of APPBASE_CSS_SOURCES) {
          try { await loadCss(href); return; } catch (_) {}
        }
        showFailure("Failed to load app base CSS from all sources.");
      })();
    })();
  </script>
  <script>
    (function () {
      const HEADER_CSS_SOURCES = [
        /*"./styles/site-header.css",  local dev copy first */
        "https://jonathanvajda.github.io/OntoEagle/styles/site-header.css",
        "https://jonathanvajda.github.io/table-nova/styles/site-header.css",
      ];

      function loadCss(href) {
        return new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = href;

          link.onload = () => resolve(href);
          link.onerror = () => reject(new Error("CSS failed: " + href));

          document.head.appendChild(link);
        });
      }

      function showFailure(msg) {
        console.error(msg);
        // Optional user-visible banner
        const style = document.createElement("style");
        style.textContent =
          ".asset-fail-banner{position:fixed;left:0;right:0;top:0;z-index:9999;" +
          "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
          "border-bottom:1px solid rgba(0,0,0,.2)}";
        document.head.appendChild(style);

        const div = document.createElement("div");
        div.className = "asset-fail-banner";
        div.textContent = msg;
        document.body ? document.body.prepend(div) : document.addEventListener("DOMContentLoaded", () => document.body.prepend(div));
      }

      (async () => {
        for (const href of HEADER_CSS_SOURCES) {
          try { await loadCss(href); return; } catch (_) {}
        }
        showFailure("Failed to load header CSS from all sources.");
      })();
    })();
  </script>

  <!-- App Local CSS -->
  <link rel="stylesheet" href="./styles/ontology-curation-manager.css" />
</head>

<body data-page-id="ontology-curation-manager">

  <header id="siteHeader" class="sitehdr-root table-nova-header" role="banner" aria-label="Site header"></header>

  <div class="ocq-app ocq-theme-light" id="appRoot">
    <div class="ocq-section ocq-card">
      <div class="ocq-toolbar">
        <div class="ocq-toolbar-left">
          <label class="ocq-label" for="ontologyFiles">Ontology files</label>
          <div class="ocq-file-row"></div>
            <input class="ocq-input ocq-input-file" type="file" id="ontologyFiles" accept=".ttl,.rdf,.owl,.nt,.nq,.trig,.jsonld" multiple />
            <p>Select an ontology file (e.g., TTL) and click "Run checks".<br /> Results will be logged to the browser console, and a per-resource curation table will appear below.</p>
          <div class="ocq-actions">
            <button id="runChecksBtn" class="ocq-btn ocq-btn-primary" type="button">Run checks</button>
            <button id="runBatchBtn" class="ocq-btn ocq-btn-secondary" type="button">Run batch checks</button>
          </div>
        </div>

          <p class="ocq-help">
            Tip: For keyboard users, requirement rows are focusable — press Enter/Space to open details.
          </p>
        </div>
  <div id="dashboardContainer" class="ocq-section ocq-card"></div>
  
  <!-- Container for the ontology-level report -->
  <div id="ontologyReportContainer" class="ocq-section ocq-card"></div>


  <div id="requirementDetailContainer"></div>
    <div id="status" class="ocq-status" aria-live="polite"></div>
    <div id="curationFiltersContainer" class="ocq-section ocq-card">
      <h2 class="ocq-title">Resource filters</h2>

  <div id="curationFilters" class="ocq-filters">
    
      <div class="ocq-filter">
        <label class="ocq-label" for="statusFilter">Curation status</label>
        <select id="statusFilter" class="ocq-input ocq-select">
          <option value="">All</option>
          <option value="uncurated">uncurated</option>
          <option value="metadata incomplete">metadata incomplete</option>
          <option value="metadata complete">metadata complete</option>
          <option value="pending final vetting">pending final vetting</option>
        </select>
      </div>
        
      <div class="ocq-filter">
        <label class="ocq-label" for="requirementFilter">Fails requirement / recommendation</label>
        <select id="requirementFilter" class="ocq-input ocq-select">
          <option value="">Any</option>
        </select>
      </div>

      <div class="ocq-filter">
        <label>
          Resource IRI contains:
          <input id="resourceSearch" class="ocq-input" type="text" placeholder="e.g., obo:IAO_" autocomplete="off" />
        </label>
      </div>
    </div>
    

        <div class="ocq-filter ocq-filter-actions">
          <button id="clearFiltersBtn" class="ocq-btn ocq-btn-secondary" type="button">
            Clear filters
          </button>
        </div>
      </div>

      <div id="curationFiltersSummary" class="ocq-status" aria-live="polite"></div>


  <!-- Container for the per-resource curation table -->
  <div id="curationTableContainer"></div>

  <div id="requirementDetailContainer"></div>

    </div>


   <div class="ocq-toolbar-right">
          <div class="ocq-export" role="group" aria-label="Download exports">
          <label for="downloadActionSelect" class="ocq-label">Download</label>

          <select id="downloadActionSelect" class="ocq-select">
            <option value="">Choose export…</option>

            <optgroup label="Current run">
              <option value="resultsCsv">Results CSV</option>
              <option value="ontologyYaml">Ontology Report YAML</option>
              <option value="htmlReport">HTML Report</option>
              <option value="filteredResourcesCsv">Filtered Resources CSV</option>
              <option value="requirementDetailCsv">Requirement Detail CSV</option>
            </optgroup>

            <optgroup label="Batch run">
              <option value="batchSummaryCsv">Batch Summary CSV</option>
            </optgroup>
          </select>

          <button
            id="downloadSelectedBtn"
            class="ocq-btn ocq-btn-tertiary"
            type="button"
            disabled
          >
            Download
          </button>

            <!-- Phase 6.2: Saved runs -->
            <select id="savedRunsSelect" class="ocq-input ocq-select" aria-label="Saved runs">
              <option value="">Saved runs…</option>
            </select>
            <button id="loadSavedRunBtn" class="ocq-btn ocq-btn-tertiary" type="button">Load</button>
            <button id="deleteSavedRunBtn" class="ocq-btn ocq-btn-tertiary" type="button">Delete</button>
            <button id="printReportBtn" class="ocq-btn ocq-btn-tertiary" type="button">Print</button>            
          </div>
        </div>
      </div>
    </div>

    <!-- Container for the per-resource curation table -->
    <div id="curationTableContainer" class="ocq-section ocq-card"></div>

    <div id="requirementDetailContainer" class="ocq-section ocq-card"></div>
 
  </div>

  <!-- Vendor JS -->
  <script src="./app/n3.min.js"></script>
  <script src="./app/comunica-browser.js"></script>

  <!-- Header JS -->
  <script>
    (function () {
      const JS_SOURCES = [
        /*"./app/site-header.js",  local dev copy first */
        "https://jonathanvajda.github.io/OntoEagle/app/site-header.js",
        "https://jonathanvajda.github.io/table-nova/app/site-header.js",
      ];

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.defer = true;

          s.onload = () => resolve(src);
          s.onerror = () => reject(new Error("JS failed: " + src));

          document.head.appendChild(s);
        });
      }

      function showFailure(msg) {
        console.error(msg);
        const div = document.createElement("div");
        div.style.cssText =
          "position:fixed;left:0;right:0;bottom:0;z-index:9999;" +
          "padding:.5rem .75rem;font:14px system-ui;background:#ffe8e8;color:#400;" +
          "border-top:1px solid rgba(0,0,0,.2)";
        div.textContent = msg;
        document.body ? document.body.appendChild(div) : document.addEventListener("DOMContentLoaded", () => document.body.appendChild(div));
      }

      (async () => {
        for (const src of JS_SOURCES) {
          try { await loadScript(src); return; } catch (_) {}
        }
        showFailure("Failed to load header JavaScript from all sources.");
      })();
    })();
  </script>
  <script type="module" src="./app/main.js"></script>
  
</body>
</html>
